name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Create plugin zip
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cd TopJellyfin/bin/Release/net8.0
          zip -j "TopJellyfin_${TAG_NAME}.zip" TopJellyfin.dll

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TopJellyfin/bin/Release/net8.0/TopJellyfin_*.zip
          generate_release_notes: true

  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download release asset
        env:
          TAG_NAME: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download "$TAG_NAME" -p "*.zip" -D /tmp

      - name: Compute checksum and update manifest
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          ZIP_FILE=$(ls /tmp/TopJellyfin_*.zip | head -1)
          CHECKSUM=$(md5sum "$ZIP_FILE" | awk '{print $1}')
          VERSION="${TAG_NAME#v}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          SOURCE_URL="https://github.com/pincharo/TopJellyfin/releases/download/${TAG_NAME}/TopJellyfin_${TAG_NAME}.zip"

          cat > manifest.json << EOF
          [
            {
              "guid": "a1b2c3d4-e5f6-7890-abcd-ef1234567890",
              "name": "TopJellyfin",
              "description": "Secciones personalizadas de inicio con Trakt.tv",
              "overview": "Recientemente estrenado y Top desde Trakt.tv",
              "owner": "pincharo",
              "category": "General",
              "versions": [
                {
                  "version": "${VERSION}.0",
                  "changelog": "Release ${VERSION}",
                  "targetAbi": "10.10.0.0",
                  "sourceUrl": "${SOURCE_URL}",
                  "checksum": "${CHECKSUM}",
                  "timestamp": "${TIMESTAMP}"
                }
              ]
            }
          ]
          EOF

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --cached --quiet || git commit -m "Update manifest for release"
          git push
